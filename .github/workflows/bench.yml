name: bench

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh results every Monday 12:00 UTC so the README stays current as
    # upstream risc0-crypto / patched RustCrypto forks evolve.
    - cron: '0 12 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench
          cache-on-failure: true

      - name: Install rzup + r0vm toolchain
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.risc0/bin:$PATH"
          rzup install
          r0vm --version

      - name: Run benchmarks
        run: cargo run --release -- --json results.json --markdown results.md

      - name: Splice results into README
        run: scripts/update-readme.sh README.md results.md

      - name: Publish to step summary
        run: |
          {
            echo "## Latest results"
            echo
            cat results.md
            echo
            echo "_Source: \`${GITHUB_SHA}\` · run [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            results.json
            results.md

      - name: Open / update auto-bench PR
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/bench-update
          base: main
          delete-branch: true
          commit-message: |
            chore(bench): refresh cycle counts

            Source: ${{ github.sha }}
            Run:    ${{ github.run_id }}
          title: "chore(bench): refresh cycle counts"
          body: |
            Auto-generated by [`bench.yml`](.github/workflows/bench.yml) on
            `${{ github.sha }}` (run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})).

            Reuses the `ci/bench-update` branch — new runs force-update this PR;
            the PR auto-closes if a later main commit eliminates the diff.
          labels: bench
          add-paths: README.md
